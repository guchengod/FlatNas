root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main.exe ."
  bin = "tmp/main.exe"
  full_bin = "tmp/main.exe"
  include_ext = ["go", "tpl", "tmpl", "html", "json", "yaml", "yml"]
  exclude_dir = ["tmp", "vendor", "server/public", "server/doc"]
  delay = 400
  stop_on_error = true
  send_interrupt = true

[color]
  main = "cyan"
  watcher = "yellow"
  build = "green"
  runner = "magenta"

[log]
  time = true

[misc]
  clean_on_exit = true
